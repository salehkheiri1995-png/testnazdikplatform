[alembic]
# مسیر اسکریپت‌های migration
script_location = alembic

# قالب نام فایل version
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# تمام datetime ها در UTC ذخیره می‌شوند
timezone = UTC

# DATABASE_URL از env خوانده می‌شود — در env.py تنظیم شده
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# اجرای ruff بعد از تولید هر فایل migration
hooks = ruff
ruff.type = exec
ruff.entrypoint = ruff
ruff.options = --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %%H:%%M:%%S
